<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AudioNodes.ai</title>

<style>
body{
background: radial-gradient(circle at top,#0B1120,#020617);
color:white;
font-family: "Segoe UI", Arial, sans-serif;
text-align:center;
margin:0;
}


/* HEADER */

header{
font-size:48px;
padding:40px;
color:#00E5FF;
font-weight:bold;
letter-spacing:2px;
text-shadow:0 0 15px rgba(0,229,255,0.7);
}

.tagline{
color:#9CA3AF;
margin-bottom:40px;
font-size:18px;
}


/* MAIN CONTAINER */

.container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}


/* CARDS */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:40px;
border-radius:16px;
width:350px;

box-shadow:
0 0 30px rgba(0,229,255,0.2),
inset 0 0 10px rgba(255,255,255,0.05);

transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:
0 0 40px rgba(0,229,255,0.5);
}


/* UPLOAD BUTTON */

.upload-box{
display:inline-block;
padding:16px 28px;
background:linear-gradient(135deg,#00E5FF,#7C3AED);
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin-top:10px;

box-shadow:0 0 20px rgba(124,58,237,0.6);
transition:0.25s;
}

.upload-box:hover{
transform:scale(1.05);
box-shadow:0 0 35px rgba(0,229,255,0.9);
}

.upload-box input{
display:none;
}


/* FILE NAME */

#fileName{
margin-top:12px;
color:#9CA3AF;
font-size:14px;
}


/* AUDIO PLAYER */

#audioPlayer{
width:100%;
margin-top:15px;
outline:none;
border-radius:10px;
filter: drop-shadow(0 0 10px rgba(0,229,255,0.5));
}


/* BUTTONS */

button{
margin-top:18px;
padding:12px 24px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#00E5FF,#7C3AED);
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 15px rgba(0,229,255,0.5);
transition:0.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 30px rgba(0,229,255,0.9);
}


/* INPUT */

input{
margin-top:12px;
padding:12px;
border-radius:8px;
border:none;
width:80%;
background:#020617;
color:white;
box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
}


/* RESULT */

#result{
margin-top:40px;
font-size:20px;
}


/* RESULT CARD */

.result-card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:12px;
display:inline-block;
box-shadow:0 0 20px rgba(0,229,255,0.3);
animation:fadeIn 0.4s ease-in-out;
}

.result-card p{
margin:8px 0;
color:#9CA3AF;
}


/* 🔥 TRANSPOSE CONTAINER */

.transpose-container{
margin-top:30px;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
flex-wrap:wrap;
}

.transpose-container h3{
width:100%;
margin-bottom:10px;
color:#00E5FF;
}

#transposeValue{
font-size:22px;
font-weight:bold;
color:#00E5FF;
min-width:40px;
display:inline-block;
}


/* WAVEFORM */

.waveform-container{
margin-top:40px;
}

#waveform{
margin-top:20px;
background:#020617;
border-radius:12px;

box-shadow:
0 0 30px rgba(0,229,255,0.5),
inset 0 0 10px rgba(0,0,0,0.8);

width:90%;
max-width:1000px;
}


/* TIMELINE */

.timeline-container{
margin-top:40px;
}

#timeline{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}


/* CHORD BLOCK */

.chord-block{
background:linear-gradient(135deg,#00E5FF,#7C3AED);
padding:10px 18px;
border-radius:10px;
font-weight:bold;

box-shadow:0 0 15px rgba(124,58,237,0.6);

transition:0.25s;
cursor:pointer;
}

.chord-block:hover{
transform:scale(1.1);
box-shadow:0 0 25px rgba(0,229,255,1);
}

.chord-block span{
display:block;
font-size:16px;
}

.chord-block small{
font-size:11px;
opacity:0.8;
}


/* ACTIVE CHORD */

.chord-block.active{
background:#00E5FF;
color:black;
transform:scale(1.2);

box-shadow:
0 0 30px #00E5FF,
0 0 60px rgba(0,229,255,0.8);
}


/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}


/* MOBILE */

@media (max-width:768px){

header{
font-size:34px;
}

.card{
width:90%;
}

#waveform{
width:95%;
}

.transpose-container{
flex-direction:column;
}

}
</style>

</head>

<body>

<header>AudioNodes.ai</header>

<div class="tagline">
Analyze Sound • Detect Genre • Reveal Chords
</div>

<div class="container">

<div class="card">

<h2>Upload Audio</h2>

<label class="upload-box">
<input type="file" id="audioFile" accept=".mp3,.wav">
<span>🎧 Upload Audio File</span>
</label>

<p id="fileName"></p>

<audio id="audioPlayer" controls></audio>

<button id="analyzeBtn">Analyze Music</button>

</div>

<div class="card">

<h2>Enter Frequency</h2>

<input type="number" id="frequency" placeholder="Example: 440">

<button id="freqBtn">Detect Note</button>

</div>

</div>

<div id="result"></div>

<!-- TRANSPOSE -->
<div class="transpose-container">
<h3>Transpose</h3>
<button onclick="changeTranspose(-1)">➖</button>
<span id="transposeValue">0</span>
<button onclick="changeTranspose(1)">➕</button>
</div>

<!-- TIMELINE -->
<div class="timeline-container">
<h3>Chord Timeline</h3>
<div id="timeline"></div>
</div>

<!-- WAVEFORM -->
<div class="waveform-container">
<h3>Waveform</h3>
<canvas id="waveform" width="900" height="200"></canvas>
</div>

<script>
// (Your JS remains EXACTLY same — no changes made)
</script>

</body>
</html>
